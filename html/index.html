<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nginx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .badge {
            display: inline-block;
            background: #22c55e;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.125rem;
            color: #94a3b8;
            line-height: 1.75;
            margin-bottom: 2rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        .info-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            text-align: left;
        }

        .info-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 0.25rem;
        }

        .info-card .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">&#x2713; Deployed</div>
        <h1>nginx</h1>
        <p>Your application is live and running on EC2 in the <strong>ap-southeast-1</strong> region.</p>

        <div class="info-grid">
            <div class="info-card">
                <div class="label">Application</div>
                <div class="value">nginx</div>
            </div>
            <div class="info-card">
                <div class="label">Target</div>
                <div class="value">EC2</div>
            </div>
            <div class="info-card">
                <div class="label">Region</div>
                <div class="value">ap-southeast-1</div>
            </div>
            <div class="info-card">
                <div class="label">Server</div>
                <div class="value">Nginx</div>
            </div>
        </div>

        <div class="footer">
            Deployed with Ansible &mdash; nginx project
        </div>
    </div>
</body>
</html>
